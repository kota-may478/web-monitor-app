name: "Monitor|電気電子工学科、機械工学科、航空宇宙工学科、システム設計、制|7sites|毎週土曜日 9:00 JST|2026-06-13T07:35:20.635Z"
on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      JOB_ID: "a3367e0a-c32b-41e8-bd84-82724f3283b2"
      JOB_DEF_JSON: ${{ secrets.JOB_A3367E0A_DEF }}
      JOB_STATE_JSON: ${{ secrets.JOB_A3367E0A_STATE }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      GITHUB_TOKEN_FOR_SECRETS: ${{ secrets.REPO_PAT }}
      GITHUB_REPO: "kota-may478/web-monitor-app"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r scheduler/requirements.txt
      - name: Run monitor job
        run: python scheduler/run_job.py
